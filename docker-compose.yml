version: '3.8'

services:
  itecify:
    build: .
    container_name: itecify-app
    ports:
      - "3001:3001"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
